<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Smart Meal Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        html,
        body {
            height: 100%;
        }

        body {
            background-color: #f8f9fa;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            padding-top: 80px;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }
    </style>
</head>

<body>

    <div id="navbar-container"></div>

    <div class="container mb-4 mt-1">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm border">
                    <div class="card-header bg-white text-center py-3">
                        <h4 class="fw-bold mb-0">Create Account</h4>
                    </div>
                    <div class="card-body p-4">

                        <div class="d-flex justify-content-center mb-4">
                            <div class="btn-group" role="group">
                                <button type="button" class="btn btn-primary active fw-bold"
                                    onclick="switchRole('student')" id="btn-student">Student</button>
                                <button type="button" class="btn btn-outline-primary fw-bold"
                                    onclick="switchRole('kitchen_staff')" id="btn-staff">Kitchen Staff</button>
                            </div>
                        </div>

                        <form id="signupForm">
                            <input type="hidden" name="role" id="roleInput" value="student">

                            <h6 class="text-secondary border-bottom pb-2 mb-3 text-uppercase fw-bold small">Basic
                                Information</h6>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="small fw-bold">Full Name *</label>
                                    <input type="text" name="full_name" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="small fw-bold">Email Address *</label>
                                    <input type="email" name="email" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="small fw-bold">Password *</label>
                                    <input type="password" name="password" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="small fw-bold">Phone Number *</label>
                                    <input type="tel" name="phone" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="small fw-bold">Father's Name</label>
                                    <input type="text" name="father_name" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="small fw-bold">Mother's Name</label>
                                    <input type="text" name="mother_name" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="small fw-bold">Hall Name *</label>
                                    <select name="hall_name" class="form-select" required>
                                        <option value="">Select Hall</option>
                                        <option value="Kazi Nazrul Islam Hall">Kazi Nazrul Islam Hall</option>
                                        <option value="Shaheed Tajuddin Ahmad Hall">Shaheed Tajuddin Ahmad Hall</option>
                                        <option value="Madam Curie Hall">Madam Curie Hall</option>
                                        <option value="Bijoy 24 Hall">Bijoy 24 Hall</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="small fw-bold">Date of Birth</label>
                                    <input type="date" name="dob" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label class="small fw-bold">Gender</label>
                                    <select name="gender" class="form-select">
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="small fw-bold">Blood Group</label>
                                    <select name="blood_group" class="form-select">
                                        <option value="">Select</option>
                                        <option value="A+">A+</option>
                                        <option value="A-">A-</option>
                                        <option value="B+">B+</option>
                                        <option value="B-">B-</option>
                                        <option value="O+">O+</option>
                                        <option value="O-">O-</option>
                                        <option value="AB+">AB+</option>
                                        <option value="AB-">AB-</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="small fw-bold">Present Address</label>
                                    <textarea name="present_address" class="form-control" rows="2"></textarea>
                                </div>
                                <div class="col-md-6">
                                    <label class="small fw-bold">Permanent Address</label>
                                    <textarea name="permanent_address" class="form-control" rows="2"></textarea>
                                </div>
                            </div>

                            <div id="studentFields" class="form-section active mt-4">
                                <h6 class="text-secondary border-bottom pb-2 mb-3 text-uppercase fw-bold small">Student
                                    Details</h6>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="small fw-bold">Student ID *</label>
                                        <input type="number" name="student_id" class="form-control">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="small fw-bold">Registration No *</label>
                                        <input type="number" name="registration_no" class="form-control">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="small fw-bold">Department *</label>
                                        <input type="text" name="department" class="form-control">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="small fw-bold">NID</label>
                                        <input type="number" name="student_nid" class="form-control">
                                    </div>
                                    <div class="col-md-12">
                                        <label class="small fw-bold">Birth Certificate No</label>
                                        <input type="number" name="birth_certificate" class="form-control">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="small fw-bold">Photo *</label>
                                        <input type="file" name="photo" class="form-control" accept="image/*">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="small fw-bold">ID Card *</label>
                                        <input type="file" name="id_card" class="form-control" accept="image/*">
                                    </div>
                                </div>
                            </div>

                            <div id="staffFields" class="form-section mt-4">
                                <h6 class="text-secondary border-bottom pb-2 mb-3 text-uppercase fw-bold small">Staff
                                    Details</h6>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="small fw-bold">NID Number *</label>
                                        <input type="number" name="staff_nid" class="form-control">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="small fw-bold">Photo</label>
                                        <input type="file" name="staff_photo" class="form-control" accept="image/*">
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mt-4 py-2 fw-bold">Complete
                                Registration</button>
                        </form>
                        <div id="responseMessage" class="mt-3 text-center small fw-bold"></div>
                    </div>

                    <div class="text-center  mb-3 pt-3 border-top">
                        <small class="text-muted">Already registered? <a href="login.html"
                                class="text-decoration-none fw-bold">Login here</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container" class="mt-auto"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="navbar.js"></script>
    <script src="footer.js"></script>
    <script>
        renderNavbar('guest', 'signup');
        renderFooter();

        function switchRole(role) {
            document.getElementById('roleInput').value = role;

            const studentFieldsList = ['student_id', 'registration_no', 'department', 'photo', 'id_card'];
            const staffFieldsList = ['staff_nid', 'staff_photo'];

            if (role === 'student') {
                document.getElementById('studentFields').classList.add('active');
                document.getElementById('staffFields').classList.remove('active');
                document.getElementById('btn-student').className = 'btn btn-primary active fw-bold';
                document.getElementById('btn-staff').className = 'btn btn-outline-primary fw-bold';

                studentFieldsList.forEach(name => {
                    const el = document.getElementsByName(name)[0];
                    if(el) el.setAttribute('required', '');
                });

                staffFieldsList.forEach(name => {
                    const el = document.getElementsByName(name)[0];
                    if(el) el.removeAttribute('required');
                });

            } else {
                document.getElementById('studentFields').classList.remove('active');
                document.getElementById('staffFields').classList.add('active');
                document.getElementById('btn-student').className = 'btn btn-outline-primary fw-bold';
                document.getElementById('btn-staff').className = 'btn btn-primary active fw-bold';

                studentFieldsList.forEach(name => {
                    const el = document.getElementsByName(name)[0];
                    if(el) el.removeAttribute('required');
                });

                staffFieldsList.forEach(name => {
                    const el = document.getElementsByName(name)[0];
                    if(el) el.setAttribute('required', '');
                });
            }
        }

        switchRole('student');

        document.getElementById('signupForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const formData = new FormData(this);
            const responseDiv = document.getElementById('responseMessage');
            responseDiv.innerHTML = '<span class="text-muted">Processing...</span>';

            try {
                const response = await fetch('api/signup.php', { method: 'POST', body: formData });
                const result = await response.json();

                if (result.status === 'success') {
                    responseDiv.innerHTML = `<div class="alert alert-success mt-2"><i class="bi bi-check-circle me-1"></i>${result.message} <br> Redirecting to login...</div>`;
                    this.reset();
                    switchRole('student');

                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);

                } else {
                    responseDiv.innerHTML = `<div class="alert alert-danger mt-2"><i class="bi bi-exclamation-circle me-1"></i>${result.message}</div>`;
                }
            } catch (error) {
                responseDiv.innerHTML = `<div class="alert alert-danger mt-2">System Error</div>`;
            }
        });
    </script>
</body>

</html>
